<div class="comp-grid">

  <!-- ── Ligne 1 : Tableau synthèse (pleine largeur) ── -->
  <div class="chart-card comp-table-card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;gap:.35rem;flex-wrap:wrap;">
    <div class="chart-card-title" id="compTableTitle" style="margin-bottom:0">Tableau synthèse</div>
    <div style="display:flex;align-items:center;gap:.35rem;margin-left:auto;flex-wrap:wrap;">

      <!-- Checkbox Programme MOE -->
      <label style="display:flex;align-items:center;gap:.3rem;font-size:.62rem;font-weight:700;color:var(--text3);cursor:pointer;white-space:nowrap;">
        <input type="checkbox" checked onchange="toggleProgrammeMOE(this.checked)"
          style="accent-color:var(--purple);cursor:pointer;">
        Programme MOE
      </label>

      <!-- Sélecteur colonnes -->
      <div class="col-picker-wrap">
        <button class="col-picker-btn" onclick="toggleColPicker(event)">⚙ Colonnes ▾</button>
        <div class="col-picker-dropdown" id="colPickerDropdown"></div>
      </div>

      <!-- Bouton Export — même style que fs-btn -->
      <button class="fs-btn" onclick="exportCompTableCSV()" title="Export CSV">⬇ CSV</button>

      <!-- Plein écran -->
      <button class="fs-btn" onclick="fsOpenCompTable()" title="Plein écran">⛶</button>
    </div>
  </div>
  <div class="comp-table-scroll">
    <table id="compTable" class="comp-synth-table"></table>
  </div>
</div>

  <!-- ── Ligne 2 col 1 : Montées / Descentes (2/4) ── -->
  <div class="chart-card comp-bubble-card" style="display:flex;flex-direction:column;">
  <div class="chart-card-header">
    <div class="chart-card-title" id="compBubbleTitle">Sepent de Charge</div>
  
  <div style="display:flex;align-items:center;gap:4px;margin-left:auto;">

    <!-- Bouton switch vue : ↑↓ ou icône charge -->
    <button id="_bubbleViewBtn" title="Montées / Descentes"
      class="fs-btn"
      onclick="
        _chargeView = _chargeView === 'flux' ? 'charge' : 'flux';
        this.innerHTML  = _chargeView === 'flux' ? '↑↓' : '↑↓';
        this.title      = _chargeView === 'flux' ? 'Montées / Descentes' : 'Charge';
        if (window._lastBubbleAll)
          renderBubbleChartOnCanvas(document.getElementById('chargeCanvas'), null, null,
            window._lastBubbleAll, window._lastBubbleSc ?? 0);
      ">↑↓</button>

    <!-- Toggle DW -->
    <label id="_bubbleDwBox" title="DW théorique + seuils"
      style="display:flex;align-items:center;gap:3px;
      cursor:pointer;user-select:none;
      background:rgba(180,140,255,.1);
      border:1px solid rgba(180,140,255,.35);
      border-radius:3px;padding:.15rem .35rem;
      font-size:.75rem;line-height:1;
      color:rgba(180,140,255,.9);white-space:nowrap;">
      <input type="checkbox" checked style="accent-color:rgba(180,140,255,.85);margin:0;width:10px;height:10px;"
        onchange="
          _dwVisible = this.checked;
          this.parentElement.style.background  = _dwVisible ? 'rgba(180,140,255,.1)' : 'transparent';
          this.parentElement.style.borderColor = _dwVisible ? 'rgba(180,140,255,.35)' : 'rgba(100,110,140,.3)';
          this.parentElement.style.color       = _dwVisible ? 'rgba(180,140,255,.9)' : 'var(--text3)';
          if (window._lastBubbleAll)
            renderBubbleChartOnCanvas(document.getElementById('chargeCanvas'), null, null,
              window._lastBubbleAll, window._lastBubbleSc ?? 0);
        ">
        ⏲
    </label>

    <button class="fs-btn" onclick="fsOpenBubble()" title="Plein écran">⛶</button>
  </div>
</div>
  <!-- Sélecteur scénario : pills style projet, sélection unique -->
  <div style="display:flex;align-items:center;gap:8px;padding:.3rem .5rem .2rem;border-bottom:1px solid var(--border);margin-bottom:.4rem;flex-wrap:wrap;">
  <!-- Sélecteur scénario (pills) -->
  <div id="chargeScSelector" style="display:flex;flex-wrap:wrap;gap:5px;flex:1;"></div>
  <!-- Bouton direction -->
  <div style="display:flex;gap:4px;flex-shrink:0;">
    <button class="dir-btn dir-btn-aller active" id="bubbleDirBtnA"
            onclick="setBubbleDir('aller')">↓ Aller</button>
    <button class="dir-btn dir-btn-retour" id="bubbleDirBtnR"
            onclick="setBubbleDir('retour')">↑ Retour</button>
  </div>
</div>
  <!-- Canvas : prend toute la hauteur restante du bloc -->
  <div style="display:flex;flex:1;min-height:0;">
    <canvas id="chargeAxisCanvas" style="flex-shrink:0;display:block;"></canvas>
    <div class="comp-bubble-scroll" style="flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;">
      <canvas id="chargeCanvas" style="display:block;height:100%;"></canvas>
    </div>
  </div>
</div>

  <!-- ── Ligne 2 col 2 : Radar des indicateurs (1/4) ── -->
  <div class="chart-card comp-radar-card">
    <div class="chart-card-header">
      <div class="chart-card-title" id="compRadarTitle">Radar des indicateurs</div>
      <button class="fs-btn" onclick="fsOpenRadar()" title="Plein écran">⛶</button>
    </div>
    <div id="radarScSelector" style="display:flex;flex-wrap:wrap;gap:.35rem;padding:.3rem .5rem .1rem;border-bottom:1px solid var(--border);margin-bottom:.4rem;min-height:28px;"></div>
    <div style="display:flex;align-items:center;justify-content:center;">
      <svg id="radarSvg" viewBox="0 0 320 280" style="width:100%;max-width:340px;height:auto;"></svg>
    </div>
  </div>

  <!-- ── Lignes 2+3 col 3 : Carte du tracé (1/4, span 2 lignes) ── -->
  <div class="chart-card comp-map-card">
    <div class="chart-card-header">
      <div class="chart-card-title" id="compMapTitle">Carte du tracé</div>
      <div style="display:flex;gap:.25rem;align-items:center;">
        <button class="fs-btn map-tile-btn active" data-tile="standard"  onclick="setMapTile('standard')"  title="Standard">🗺 Std</button>
        <button class="fs-btn map-tile-btn"        data-tile="satellite" onclick="setMapTile('satellite')" title="Satellite">🛰 Sat</button>
        <button class="fs-btn map-tile-btn"        data-tile="transport" onclick="setMapTile('transport')" title="Transport">🚌 Tsp</button>
        <button class="fs-btn" onclick="fsOpenMap()" title="Plein écran">⛶</button>
      </div>
    </div>
    <div class="map-container">
      <div id="osmMap">
        <div class="map-no-data">
          <div class="map-no-data-icon">🗺️</div>
          <div id="mapNoDataTxt">Chargez un fichier pour afficher le tracé</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Ligne 3 cols 1-2 : Couverture SP (3/4) ── -->
  <div class="chart-card comp-sp-card">
    <div class="chart-card-header">
      <div class="chart-card-title" id="compSPTitle">Couverture des incidents par scénario SP</div>
      <button class="fs-btn" onclick="fsOpenSP()" title="Plein écran">⛶</button>
    </div>
    <!-- scroll horiz + vert interne uniquement -->
    <div class="sp-matrix-wrap">
      <div id="spMatrixContainer"></div>
    </div>
  </div>

  <!-- ── Ligne 4 : Comparaison terminus (pleine largeur) ── -->
  <div class="chart-card comp-terminus-card">
    <div class="chart-card-header">
      <div class="chart-card-title" id="compTermTitle">Comparaison des temps au terminus</div>
      <button class="fs-btn" onclick="fsOpenCompTerminus()" title="Plein écran">⛶</button>
    </div>
    <div id="compTermContent"><div style="color:var(--text3);font-size:.6rem;padding:.5rem;">—</div></div>
  </div>

</div>
