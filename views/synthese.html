<!-- SCORECARD GLOBAL -->
  <div class="synth-section">
    <div class="synth-title" id="synthScorecardTitle">Scorecard global</div>
    <div class="scorecard-wrap">
      <!-- Score global -->
      <div class="scorecard-global">
        <div class="scorecard-global-stars" id="scGlobalStars"></div>
        <div class="scorecard-global-label">
          <span class="scorecard-global-num" id="scGlobalNum">—</span>
          <span class="scorecard-global-denom">/5</span>
          <span class="scorecard-global-text" id="scGlobalLabel">GLOBAL</span>
        </div>
      </div>
      <!-- Critères -->
      <div class="scorecard-criteria" id="scorecardCriteria"></div>
    </div>
  </div>
